name: Test

on:
  push:
    branches: [test/riscv32]
  workflow_dispatch:
    inputs:
      publish:
        default: false
        description: Publish package
        required: false
        type: boolean

jobs:
  build:
    name: Build native libraries
    strategy:
      matrix:
        include:
          - library: libeth_pairings.so
            os: ubuntu-22.04
            rid: linux-riscv32
            target: riscv32imac-unknown-none-elf
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out eip1962 repository
        uses: actions/checkout@v4
        with:
          repository: nethermindeth/eip1962
          ref: test/riscv32
          path: eth_pairings

      # - name: Set up GNU C compiler for arm64
      #   run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set up Rust
        run: |
          curl -sL https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2024.11.22/riscv32-elf-ubuntu-22.04-gcc-nightly-2024.11.22-nightly.tar.xz -o riscv32.tar.xz
          sudo mkdir -p /opt/riscv32
          sudo tar xf riscv32.tar.xz -C /opt/riscv32/
          export PATH=/opt/riscv32/riscv/bin:$PATH
          rustup update
          rustup target add ${{ matrix.target }}

      - name: Build
        working-directory: eth_pairings
        run: cargo build --release --target ${{ matrix.target }} --features eip_196_c_api,eip_2357_c_api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: eth_pairings/target/${{ matrix.target }}/release/${{ matrix.library }}
          retention-days: 2
          if-no-files-found: error

